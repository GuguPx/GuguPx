<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1640" viewBox="0 0 1200 1640" role="img" aria-labelledby="title desc"><title id="title">Augusto Silva — DevOps Engineer e Full-Stack Developer</title><desc id="desc">README profissional animado em tema escuro, clean e compatível com GitHub.</desc><defs><linearGradient id="acc" x1="0" x2="1"><stop stop-color="#58a6ff"/><stop offset=".38" stop-color="#3fb950"/><stop offset=".7" stop-color="#d29922"/><stop offset="1" stop-color="#bc8cff"/></linearGradient><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/></linearGradient><filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1200" height="1640" rx="28" fill="url(#bg)"/><rect x="24" y="24" width="1152" height="1592" rx="22" fill="#0d1117" stroke="#30363d"/><rect x="24" y="24" width="1152" height="52" rx="22" fill="#161b22"/><rect x="24" y="54" width="1152" height="22" fill="#161b22"/><circle cx="52" cy="50" r="6" fill="#ff7b72"/><circle cx="74" cy="50" r="6" fill="#d29922"/><circle cx="96" cy="50" r="6" fill="#3fb950"/><text x="600" y="55" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="13">augusto@devops:~/profile</text><circle cx="1122" cy="50" r="5" fill="#3fb950" filter="url(#glow)"><animate attributeName="opacity" values=".25;1;.25" dur="1.6s" repeatCount="1" fill="freeze"/></circle><g opacity="0"><animate attributeName="opacity" values="0;1;1" keyTimes="0;.12;1" dur="8s" repeatCount="1" fill="freeze"/><text x="58" y="135" fill="#8b949e" font-family="monospace" font-size="15">$ whoami</text><text x="58" y="202" fill="#f0f6fc" font-family="Arial,sans-serif" font-size="54" font-weight="700">Augusto Silva</text><text x="58" y="242" fill="#58a6ff" font-family="Arial,sans-serif" font-size="24" font-weight="700">DevOps Engineer · Full-Stack Developer</text><text x="58" y="282" fill="#8b949e" font-family="Arial,sans-serif" font-size="18">Automação · Integrações · Infraestrutura · Observabilidade</text><rect x="58" y="310" width="0" height="3" rx="2" fill="url(#acc)"><animate attributeName="width" values="0;1084;1084" keyTimes="0;.25;1" dur="8s" repeatCount="1" fill="freeze"/></rect></g><g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.1;.2;1" dur="8s" repeatCount="1" fill="freeze"/><text x="58" y="370" fill="#3fb950" font-family="monospace" font-size="15">$ cat about.md</text><text x="1140" y="370" text-anchor="end" fill="#6e7681" font-family="Arial,sans-serif" font-size="12">SOBRE MIM</text><text x="58" y="420" fill="#f0f6fc" font-family="Arial,sans-serif" font-size="18"><tspan x="58">Profissional de DevOps e desenvolvimento Full-Stack, focado em plataformas internas,</tspan><tspan x="58" dy="30">APIs, integrações e automações que transformam necessidades operacionais em software.</tspan></text><text x="58" y="500" fill="#8b949e" font-family="Arial,sans-serif" font-size="17"><tspan x="58">Atuo do levantamento de requisitos e modelagem dos dados até a implantação,</tspan><tspan x="58" dy="29">monitoramento e manutenção em produção, com foco em confiabilidade e evolução contínua.</tspan></text></g><g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.2;.3;1" dur="8s" repeatCount="1" fill="freeze"/><text x="58" y="610" fill="#3fb950" font-family="monospace" font-size="15">$ ls ./work</text><text x="1140" y="610" text-anchor="end" fill="#6e7681" font-family="Arial,sans-serif" font-size="12">O QUE CONSTRUO</text><g font-family="Arial,sans-serif"><rect x="58" y="650" width="330" height="108" rx="16" fill="#161b22" stroke="#30363d"/><rect x="58" y="650" width="5" height="108" rx="3" fill="#58a6ff"/><text x="80" y="683" fill="#58a6ff" font-size="13" font-weight="700">APLICAÇÕES</text><text x="80" y="716" fill="#f0f6fc" font-size="14">Interfaces, painéis e experiências</text><text x="80" y="739" fill="#8b949e" font-size="14">web responsivas.</text><rect x="420" y="650" width="330" height="108" rx="16" fill="#161b22" stroke="#30363d"/><rect x="420" y="650" width="5" height="108" rx="3" fill="#3fb950"/><text x="442" y="683" fill="#3fb950" font-size="13" font-weight="700">APIS E INTEGRAÇÕES</text><text x="442" y="716" fill="#f0f6fc" font-size="14">Serviços REST, filas e regras</text><text x="442" y="739" fill="#8b949e" font-size="14">de negócio.</text><rect x="782" y="650" width="330" height="108" rx="16" fill="#161b22" stroke="#30363d"/><rect x="782" y="650" width="5" height="108" rx="3" fill="#d29922"/><text x="804" y="683" fill="#d29922" font-size="13" font-weight="700">AUTOMAÇÃO</text><text x="804" y="716" fill="#f0f6fc" font-size="14">Rotinas que reduzem trabalho</text><text x="804" y="739" fill="#8b949e" font-size="14">manual e sincronizam dados.</text><rect x="58" y="785" width="330" height="108" rx="16" fill="#161b22" stroke="#30363d"/><rect x="58" y="785" width="5" height="108" rx="3" fill="#bc8cff"/><text x="80" y="818" fill="#bc8cff" font-size="13" font-weight="700">PLATAFORMAS</text><text x="80" y="851" fill="#f0f6fc" font-size="14">CRMs, dashboards e gestão</text><text x="80" y="874" fill="#8b949e" font-size="14">de processos internos.</text><rect x="420" y="785" width="330" height="108" rx="16" fill="#161b22" stroke="#30363d"/><rect x="420" y="785" width="5" height="108" rx="3" fill="#58a6ff"/><text x="442" y="818" fill="#58a6ff" font-size="13" font-weight="700">INFRAESTRUTURA</text><text x="442" y="851" fill="#f0f6fc" font-size="14">Containers, CI/CD, Nginx</text><text x="442" y="874" fill="#8b949e" font-size="14">e servidores Linux.</text><rect x="782" y="785" width="330" height="108" rx="16" fill="#161b22" stroke="#30363d"/><rect x="782" y="785" width="5" height="108" rx="3" fill="#3fb950"/><text x="804" y="818" fill="#3fb950" font-size="13" font-weight="700">OBSERVABILIDADE</text><text x="804" y="851" fill="#f0f6fc" font-size="14">Logs, monitoramento e</text><text x="804" y="874" fill="#8b949e" font-size="14">diagnóstico de falhas.</text></g></g><g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.32;.42;1" dur="8s" repeatCount="1" fill="freeze"/><text x="58" y="970" fill="#3fb950" font-family="monospace" font-size="15">$ ./pipeline --production</text><text x="1140" y="970" text-anchor="end" fill="#6e7681" font-family="Arial,sans-serif" font-size="12">WORKFLOW</text><path d="M120 1055H1080" stroke="#30363d" stroke-width="6" stroke-linecap="round"/><path d="M120 1055H1080" stroke="url(#acc)" stroke-width="3" stroke-linecap="round" stroke-dasharray="18 20"><animate attributeName="stroke-dashoffset" from="0" to="-76" dur="2.4s" repeatCount="1" fill="freeze"/></path><g font-family="Arial,sans-serif" text-anchor="middle"><circle cx="120" cy="1055" r="31" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/><text x="120" y="1060" fill="#58a6ff" font-size="12" font-weight="700">CODE</text><circle cx="440" cy="1055" r="31" fill="#0d1117" stroke="#3fb950" stroke-width="2"/><text x="440" y="1060" fill="#3fb950" font-size="12" font-weight="700">BUILD</text><circle cx="760" cy="1055" r="31" fill="#0d1117" stroke="#d29922" stroke-width="2"/><text x="760" y="1060" fill="#d29922" font-size="12" font-weight="700">DEPLOY</text><circle cx="1080" cy="1055" r="31" fill="#0d1117" stroke="#bc8cff" stroke-width="2"/><text x="1080" y="1060" fill="#bc8cff" font-size="12" font-weight="700">MONITOR</text></g><circle r="7" fill="#3fb950" filter="url(#glow)"><animateMotion path="M120 1055H1080" dur="4.8s" repeatCount="1" fill="freeze"/></circle></g><g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.46;.56;1" dur="8s" repeatCount="1" fill="freeze"/><text x="58" y="1160" fill="#3fb950" font-family="monospace" font-size="15">$ cat /etc/stack.conf</text><text x="1140" y="1160" text-anchor="end" fill="#6e7681" font-family="Arial,sans-serif" font-size="12">TECNOLOGIAS</text><g font-family="Arial,sans-serif" font-size="16"><text x="58" y="1210" fill="#58a6ff" font-family="monospace" font-size="13">FRONTEND</text><text x="180" y="1210" fill="#f0f6fc">React · Next.js · TypeScript · JavaScript · Tailwind CSS · React Query · Zustand</text><text x="58" y="1255" fill="#3fb950" font-family="monospace" font-size="13">BACKEND</text><text x="180" y="1255" fill="#f0f6fc">Node.js · NestJS · Express · Prisma · REST APIs · JWT · BullMQ</text><text x="58" y="1300" fill="#d29922" font-family="monospace" font-size="13">DATA</text><text x="180" y="1300" fill="#f0f6fc">PostgreSQL · Redis · MySQL · AWS S3</text><text x="58" y="1345" fill="#bc8cff" font-family="monospace" font-size="13">DEVOPS</text><text x="180" y="1345" fill="#f0f6fc">Docker · Docker Compose · GitHub Actions · Nginx · PM2 · Linux</text><text x="58" y="1390" fill="#3fb950" font-family="monospace" font-size="13">TOOLING</text><text x="180" y="1390" fill="#f0f6fc">Git · GitHub · Postman · Playwright · Zabbix · Figma</text></g></g><g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.6;.7;1" dur="8s" repeatCount="1" fill="freeze"/><rect x="58" y="1450" width="1084" height="112" rx="18" fill="#161b22" stroke="#30363d"/><text x="82" y="1485" fill="#3fb950" font-family="monospace" font-size="14">$ echo $GOAL</text><text x="82" y="1525" fill="#f0f6fc" font-family="Arial,sans-serif" font-size="17">Criar sistemas seguros, escaláveis e fáceis de manter, resolvendo problemas reais de negócio.</text></g><text x="600" y="1595" text-anchor="middle" fill="#6e7681" font-family="monospace" font-size="12">built as code · shipped with automation · monitored in production</text></svg>