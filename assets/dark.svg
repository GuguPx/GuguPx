<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Augusto Silva — DevOps Engineer and Full-Stack Developer</title>
  <desc id="desc">Animated dark-mode profile banner showing a terminal, delivery pipeline and technology stack.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#071a12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f81f7"/>
      <stop offset="0.52" stop-color="#3fb950"/>
      <stop offset="1" stop-color="#a3ffb0"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#3fb950" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#8b949e" stroke-width="0.6" stroke-opacity="0.16"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="terminalClip">
      <rect x="55" y="105" width="540" height="260" rx="18"/>
    </clipPath>
  </defs>

  <rect width="1200" height="420" rx="24" fill="url(#background)"/>
  <rect width="1200" height="420" rx="24" fill="url(#grid)"/>
  <rect x="-260" y="0" width="260" height="420" fill="url(#scan)" opacity="0.8">
    <animate attributeName="x" from="-260" to="1200" dur="7s" repeatCount="indefinite"/>
  </rect>

  <circle cx="1040" cy="60" r="20" fill="#3fb950" opacity="0.08">
    <animate attributeName="r" values="18;72;18" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.02;0.08" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1120" cy="330" r="30" fill="#2f81f7" opacity="0.06">
    <animate attributeName="r" values="25;90;25" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.07;0.01;0.07" dur="10s" repeatCount="indefinite"/>
  </circle>

  <text x="55" y="52" fill="#f0f6fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" letter-spacing="0.4">Augusto Silva</text>
  <text x="55" y="80" fill="#8b949e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" letter-spacing="1.6">DEVOPS ENGINEER · FULL-STACK DEVELOPER</text>
  <circle cx="1128" cy="54" r="5" fill="#3fb950" filter="url(#glow)">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="1142" y="59" fill="#7ee787" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="12">ONLINE</text>

  <g clip-path="url(#terminalClip)">
    <rect x="55" y="105" width="540" height="260" rx="18" fill="#0b1016" stroke="#30363d" stroke-width="1.2"/>
    <rect x="55" y="105" width="540" height="38" fill="#161b22"/>
    <circle cx="79" cy="124" r="5" fill="#ff7b72"/>
    <circle cx="97" cy="124" r="5" fill="#d29922"/>
    <circle cx="115" cy="124" r="5" fill="#3fb950"/>
    <text x="325" y="129" text-anchor="middle" fill="#8b949e" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="12">augusto@devops:~/profile</text>

    <g font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="15">
      <text x="82" y="174" fill="#7ee787">$ <tspan fill="#c9d1d9">whoami</tspan></text>
      <text x="82" y="199" fill="#58a6ff" opacity="0">augusto-silva
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.12;0.18;1" dur="8s" repeatCount="indefinite"/>
      </text>

      <text x="82" y="232" fill="#7ee787" opacity="0">$ <tspan fill="#c9d1d9">role --current</tspan>
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.25;0.31;1" dur="8s" repeatCount="indefinite"/>
      </text>
      <text x="82" y="257" fill="#d2a8ff" opacity="0">DevOps Engineer &amp; Full-Stack Developer
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.36;0.42;1" dur="8s" repeatCount="indefinite"/>
      </text>

      <text x="82" y="290" fill="#7ee787" opacity="0">$ <tspan fill="#c9d1d9">stack --focus</tspan>
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.49;0.55;1" dur="8s" repeatCount="indefinite"/>
      </text>
      <text x="82" y="315" fill="#ffa657" opacity="0">docker linux node react postgres ci/cd
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.62;0.68;1" dur="8s" repeatCount="indefinite"/>
      </text>
      <text x="82" y="342" fill="#7ee787">$</text>
      <rect x="100" y="328" width="9" height="18" rx="1" fill="#c9d1d9">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <text x="650" y="126" fill="#f0f6fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" letter-spacing="1">SHIP RELIABLE SOFTWARE</text>
  <text x="650" y="150" fill="#8b949e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">automação · integrações · infraestrutura · observabilidade</text>

  <path d="M700 215H1105" fill="none" stroke="#30363d" stroke-width="6" stroke-linecap="round"/>
  <path d="M700 215H1105" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-dasharray="18 20" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-76" dur="2.4s" repeatCount="indefinite"/>
  </path>

  <g font-family="Inter,Segoe UI,Arial,sans-serif" text-anchor="middle">
    <g>
      <circle cx="700" cy="215" r="29" fill="#111b2a" stroke="#2f81f7" stroke-width="2"/>
      <circle cx="700" cy="215" r="30" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.7">
        <animate attributeName="r" values="30;42;30" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <text x="700" y="220" fill="#79c0ff" font-size="15" font-weight="700">CODE</text>
      <text x="700" y="267" fill="#8b949e" font-size="12">Git · APIs</text>
    </g>
    <g>
      <circle cx="835" cy="215" r="29" fill="#172016" stroke="#3fb950" stroke-width="2"/>
      <circle cx="835" cy="215" r="30" fill="none" stroke="#7ee787" stroke-width="1.5" opacity="0.7">
        <animate attributeName="r" values="30;42;30" dur="2.8s" begin="0.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="2.8s" begin="0.7s" repeatCount="indefinite"/>
      </circle>
      <text x="835" y="220" fill="#7ee787" font-size="15" font-weight="700">BUILD</text>
      <text x="835" y="267" fill="#8b949e" font-size="12">Node · React</text>
    </g>
    <g>
      <circle cx="970" cy="215" r="29" fill="#211b12" stroke="#d29922" stroke-width="2"/>
      <circle cx="970" cy="215" r="30" fill="none" stroke="#e3b341" stroke-width="1.5" opacity="0.7">
        <animate attributeName="r" values="30;42;30" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="970" y="220" fill="#e3b341" font-size="14" font-weight="700">DEPLOY</text>
      <text x="970" y="267" fill="#8b949e" font-size="12">Docker · Nginx</text>
    </g>
    <g>
      <circle cx="1105" cy="215" r="29" fill="#201727" stroke="#a371f7" stroke-width="2"/>
      <circle cx="1105" cy="215" r="30" fill="none" stroke="#d2a8ff" stroke-width="1.5" opacity="0.7">
        <animate attributeName="r" values="30;42;30" dur="2.8s" begin="2.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="2.8s" begin="2.1s" repeatCount="indefinite"/>
      </circle>
      <text x="1105" y="220" fill="#d2a8ff" font-size="12" font-weight="700">MONITOR</text>
      <text x="1105" y="267" fill="#8b949e" font-size="12">Linux · Logs</text>
    </g>
  </g>

  <g font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="12">
    <rect x="650" y="310" width="105" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
    <text x="702" y="330" text-anchor="middle" fill="#79c0ff">TypeScript</text>
    <rect x="765" y="310" width="100" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
    <text x="815" y="330" text-anchor="middle" fill="#7ee787">PostgreSQL</text>
    <rect x="875" y="310" width="92" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
    <text x="921" y="330" text-anchor="middle" fill="#ffa657">CI/CD</text>
    <rect x="977" y="310" width="100" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
    <text x="1027" y="330" text-anchor="middle" fill="#d2a8ff">Automation</text>
    <rect x="1087" y="310" width="72" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
    <text x="1123" y="330" text-anchor="middle" fill="#7ee787">Cloud</text>
  </g>

  <text x="650" y="380" fill="#6e7681" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" letter-spacing="0.5">BUILDING SCALABLE SYSTEMS THAT SOLVE REAL BUSINESS PROBLEMS</text>
</svg>
