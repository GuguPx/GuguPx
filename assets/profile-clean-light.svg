<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc"><title id="title">Augusto Silva — DevOps Engineer e Full-Stack Developer</title><desc id="desc">README animado e minimalista com apresentação, atuação, workflow, tecnologias, projetos e objetivo profissional.</desc><style>.txt{font-family:Inter,Segoe UI,Arial,sans-serif}.mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.fade{animation:pulse 5s ease-in-out infinite}.d1{animation-delay:.3s}.d2{animation-delay:.6s}.d3{animation-delay:.9s}.d4{animation-delay:1.2s}.d5{animation-delay:1.5s}.d6{animation-delay:1.8s}@keyframes pulse{0%,100%{opacity:1;transform:translateY(0)}50%{opacity:.76;transform:translateY(-4px)}}</style><defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#f6f8fa"/></linearGradient><linearGradient id="accent"><stop stop-color="#0969da"/><stop offset=".5" stop-color="#1a7f37"/><stop offset="1" stop-color="#8250df"/></linearGradient><pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#8c959f" stroke-opacity=".09"/></pattern><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#8c959f" flood-opacity=".14"/></filter><filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1200" height="1500" rx="30" fill="url(#bg)"/><rect width="1200" height="1500" rx="30" fill="url(#grid)"/><circle cx="1080" cy="95" r="100" fill="#1a7f37" opacity=".04"><animate attributeName="r" values="90;125;90" dur="9s" repeatCount="indefinite"/></circle><circle cx="95" cy="1300" r="120" fill="#0969da" opacity=".035"><animate attributeName="r" values="100;145;100" dur="11s" repeatCount="indefinite"/></circle><rect x="28" y="28" width="1144" height="1444" rx="24" fill="#ffffff" stroke="#d0d7de" filter="url(#shadow)"/><rect x="28" y="28" width="1144" height="52" rx="24" fill="#f6f8fa"/><rect x="28" y="56" width="1144" height="24" fill="#f6f8fa"/><circle cx="56" cy="54" r="6" fill="#cf222e"/><circle cx="78" cy="54" r="6" fill="#bf8700"/><circle cx="100" cy="54" r="6" fill="#1a7f37"/><text x="600" y="59" text-anchor="middle" fill="#656d76" class="mono" font-size="12">augusto@devops:~/profile — readonly</text><circle cx="1120" cy="54" r="5" fill="#1a7f37" filter="url(#glow)"><animate attributeName="opacity" values=".25;1;.25" dur="1.6s" repeatCount="indefinite"/></circle><g class="fade"><text x="58" y="137" fill="#656d76" class="mono" font-size="15">$ whoami</text><text x="58" y="198" fill="#1f2328" class="txt" font-size="52" font-weight="760">Augusto Silva</text><text x="58" y="235" fill="url(#accent)" class="txt" font-size="23" font-weight="650">DevOps Engineer · Full-Stack Developer</text><text x="58" y="278" fill="#656d76" class="txt" font-size="17">Automação · Integrações · Infraestrutura · Observabilidade</text><rect x="58" y="304" width="1084" height="3" rx="2" fill="url(#accent)" opacity=".75"><animate attributeName="width" values="0;1084;1084" keyTimes="0;.2;1" dur="8s" repeatCount="indefinite"/></rect></g><g class="fade d1"><circle cx="58" cy="355" r="5" fill="#1a7f37"/><text x="76" y="360" fill="#1a7f37" class="mono" font-size="14">$ cat about.md</text><text x="1140" y="360" text-anchor="end" fill="#656d76" class="txt" font-size="12" letter-spacing="1.4">SOBRE MIM</text><text x="58" y="408" fill="#1f2328" class="txt" font-size="18"><tspan x="58">Sou profissional de DevOps e desenvolvimento Full-Stack, com foco na criação de plataformas</tspan><tspan x="58" dy="29">internas, APIs, integrações e automações que conectam tecnologia às necessidades da operação.</tspan></text><text x="58" y="478" fill="#656d76" class="txt" font-size="17"><tspan x="58">Acompanho o software do levantamento de requisitos e modelagem dos dados até a implantação,</tspan><tspan x="58" dy="28">o monitoramento e a manutenção em produção, buscando confiabilidade e evolução contínua.</tspan></text><text x="58" y="548" fill="#656d76" class="txt" font-size="17"><tspan x="58">Meu objetivo é reduzir trabalho manual, integrar serviços e entregar sistemas escaláveis,</tspan><tspan x="58" dy="28">seguros e fáceis de manter, sempre orientados a problemas reais de negócio.</tspan></text></g><g class="fade d2"><circle cx="58" cy="635" r="5" fill="#1a7f37"/><text x="76" y="640" fill="#1a7f37" class="mono" font-size="14">$ ls ./work</text><text x="1140" y="640" text-anchor="end" fill="#656d76" class="txt" font-size="12" letter-spacing="1.4">O QUE CONSTRUO</text><g><rect x="58" y="680" width="330" height="102" rx="16" fill="#f6f8fa" stroke="#d0d7de"/><rect x="58" y="680" width="5" height="102" rx="3" fill="#0969da"/><text x="80" y="710" fill="#0969da" class="txt" font-size="13" font-weight="750">APLICAÇÕES</text><text x="80" y="739" fill="#1f2328" class="txt" font-size="14">Interfaces responsivas e painéis internos</text><text x="80" y="761" fill="#656d76" class="txt" font-size="14">para experiências web completas.</text></g><g><rect x="420" y="680" width="330" height="102" rx="16" fill="#f6f8fa" stroke="#d0d7de"/><rect x="420" y="680" width="5" height="102" rx="3" fill="#1a7f37"/><text x="442" y="710" fill="#1a7f37" class="txt" font-size="13" font-weight="750">APIS &amp; INTEGRAÇÕES</text><text x="442" y="739" fill="#1f2328" class="txt" font-size="14">Serviços REST e regras de negócio</text><text x="442" y="761" fill="#656d76" class="txt" font-size="14">conectando sistemas e dados.</text></g><g><rect x="782" y="680" width="330" height="102" rx="16" fill="#f6f8fa" stroke="#d0d7de"/><rect x="782" y="680" width="5" height="102" rx="3" fill="#9a6700"/><text x="804" y="710" fill="#9a6700" class="txt" font-size="13" font-weight="750">AUTOMAÇÃO</text><text x="804" y="739" fill="#1f2328" class="txt" font-size="14">Rotinas que eliminam etapas manuais</text><text x="804" y="761" fill="#656d76" class="txt" font-size="14">e sincronizam operações.</text></g><g><rect x="58" y="805" width="330" height="102" rx="16" fill="#f6f8fa" stroke="#d0d7de"/><rect x="58" y="805" width="5" height="102" rx="3" fill="#8250df"/><text x="80" y="835" fill="#8250df" class="txt" font-size="13" font-weight="750">PLATAFORMAS</text><text x="80" y="864" fill="#1f2328" class="txt" font-size="14">CRMs, dashboards, RH e gestão</text><text x="80" y="886" fill="#656d76" class="txt" font-size="14">de processos empresariais.</text></g><g><rect x="420" y="805" width="330" height="102" rx="16" fill="#f6f8fa" stroke="#d0d7de"/><rect x="420" y="805" width="5" height="102" rx="3" fill="#0969da"/><text x="442" y="835" fill="#0969da" class="txt" font-size="13" font-weight="750">INFRAESTRUTURA</text><text x="442" y="864" fill="#1f2328" class="txt" font-size="14">Containers, CI/CD, proxy e processos</text><text x="442" y="886" fill="#656d76" class="txt" font-size="14">em servidores Linux.</text></g><g><rect x="782" y="805" width="330" height="102" rx="16" fill="#f6f8fa" stroke="#d0d7de"/><rect x="782" y="805" width="5" height="102" rx="3" fill="#1a7f37"/><text x="804" y="835" fill="#1a7f37" class="txt" font-size="13" font-weight="750">OBSERVABILIDADE</text><text x="804" y="864" fill="#1f2328" class="txt" font-size="14">Logs, monitoramento e diagnóstico</text><text x="804" y="886" fill="#656d76" class="txt" font-size="14">para melhorar a confiabilidade.</text></g></g><g class="fade d3"><circle cx="58" cy="960" r="5" fill="#1a7f37"/><text x="76" y="965" fill="#1a7f37" class="mono" font-size="14">$ ./pipeline --production</text><text x="1140" y="965" text-anchor="end" fill="#656d76" class="txt" font-size="12" letter-spacing="1.4">WORKFLOW</text><path d="M118 1045H1082" stroke="#d8dee4" stroke-width="6" stroke-linecap="round"/><path d="M118 1045H1082" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-dasharray="16 18"><animate attributeName="stroke-dashoffset" from="0" to="-68" dur="2.3s" repeatCount="indefinite"/></path><g><circle cx="118" cy="1045" r="31" fill="#fff" stroke="#0969da" stroke-width="2"/><text x="118" y="1050" text-anchor="middle" fill="#0969da" class="txt" font-size="12" font-weight="800">CODE</text><text x="118" y="1100" text-anchor="middle" fill="#656d76" class="txt" font-size="12">Git · React · Node</text></g><g><circle cx="440" cy="1045" r="31" fill="#fff" stroke="#1a7f37" stroke-width="2"/><text x="440" y="1050" text-anchor="middle" fill="#1a7f37" class="txt" font-size="12" font-weight="800">BUILD</text><text x="440" y="1100" text-anchor="middle" fill="#656d76" class="txt" font-size="12">testes · dados</text></g><g><circle cx="762" cy="1045" r="31" fill="#fff" stroke="#9a6700" stroke-width="2"/><text x="762" y="1050" text-anchor="middle" fill="#9a6700" class="txt" font-size="12" font-weight="800">DEPLOY</text><text x="762" y="1100" text-anchor="middle" fill="#656d76" class="txt" font-size="12">Docker · Nginx</text></g><g><circle cx="1082" cy="1045" r="31" fill="#fff" stroke="#8250df" stroke-width="2"/><text x="1082" y="1050" text-anchor="middle" fill="#8250df" class="txt" font-size="12" font-weight="800">MONITOR</text><text x="1082" y="1100" text-anchor="middle" fill="#656d76" class="txt" font-size="12">Linux · logs</text></g><circle r="7" fill="#2da44e" filter="url(#glow)"><animateMotion path="M118 1045H1082" dur="4.8s" repeatCount="indefinite"/></circle></g><g class="fade d4"><circle cx="58" cy="1175" r="5" fill="#1a7f37"/><text x="76" y="1180" fill="#1a7f37" class="mono" font-size="14">$ cat /etc/stack.conf</text><text x="1140" y="1180" text-anchor="end" fill="#656d76" class="txt" font-size="12" letter-spacing="1.4">TECNOLOGIAS</text><text x="58" y="1225" fill="#0969da" class="mono" font-size="13">FRONTEND</text><text x="170" y="1225" fill="#1f2328" class="txt" font-size="15">React · Next.js · TypeScript · JavaScript · Tailwind CSS · React Query · Zustand</text><text x="58" y="1265" fill="#1a7f37" class="mono" font-size="13">BACKEND</text><text x="170" y="1265" fill="#1f2328" class="txt" font-size="15">Node.js · NestJS · Express · Prisma · REST APIs · JWT · BullMQ</text><text x="58" y="1305" fill="#9a6700" class="mono" font-size="13">DATA</text><text x="170" y="1305" fill="#1f2328" class="txt" font-size="15">PostgreSQL · Redis · MySQL · AWS S3</text><text x="58" y="1345" fill="#8250df" class="mono" font-size="13">DEVOPS</text><text x="170" y="1345" fill="#1f2328" class="txt" font-size="15">Docker · Docker Compose · GitHub Actions · Nginx · PM2 · Linux</text><text x="58" y="1385" fill="#1a7f37" class="mono" font-size="13">TOOLING</text><text x="170" y="1385" fill="#1f2328" class="txt" font-size="15">Git · GitHub · Postman · Playwright · Zabbix · Figma</text></g><g class="fade d5"><text x="58" y="1440" fill="#1a7f37" class="mono" font-size="13">$ echo $GOAL</text><text x="190" y="1440" fill="#1f2328" class="txt" font-size="15">Construir soluções seguras, escaláveis e sustentáveis — do código à produção.</text><rect x="1125" y="1424" width="9" height="20" rx="2" fill="#2da44e"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect></g></svg>